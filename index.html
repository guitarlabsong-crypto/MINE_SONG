<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile 3D Craft</title>
    <style>
        /* 기본 레이아웃: 스크롤 방지 및 하늘색 배경 */
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        
        /* 3D 무대 설정 */
        #stage {
            width: 100vw; height: 100vh;
            perspective: 1000px; /* 원근감 */
            display: flex; align-items: center; justify-content: center;
        }

        #world {
            width: 0; height: 0;
            transform-style: preserve-3d;
            /* 카메라 각도: 약간 위에서 내려다보는 시점 */
            transform: rotateX(-25deg) rotateY(45deg); 
        }

        /* 바닥 (잔디 느낌) */
        .floor {
            position: absolute; width: 2000px; height: 2000px;
            background: #567d46;
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: translate(-50%, -50%) rotateX(90deg) translateZ(-50px);
        }

        /* 캐릭터 기본 구조 */
        #player {
            position: absolute; width: 40px; height: 60px;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%); /* 중앙 정렬 */
            transition: transform 0.05s linear;
        }

        /* 큐브 공통 스타일 */
        .cube { position: absolute; transform-style: preserve-3d; }
        .face { position: absolute; background: #ff9800; border: 1px solid rgba(0,0,0,0.2); box-sizing: border-box; }

        /* 캐릭터 파츠별 설정 */
        .head { width: 24px; height: 24px; top: -26px; left: 8px; }
        .head .face { width: 24px; height: 24px; background: #fccb9f; }
        .head .front { transform: translateZ(12px); border: 2px solid #333; } /* 얼굴 */
        .head .back  { transform: rotateY(180deg) translateZ(12px); background: #4e342e; }
        .head .top   { transform: rotateX(90deg) translateZ(12px); background: #4e342e; }
        .head .left  { transform: rotateY(-90deg) translateZ(12px); }
        .head .right { transform: rotateY(90deg) translateZ(12px); }

        .torso { width: 24px; height: 32px; top: 0; left: 8px; }
        .torso .face { width: 24px; height: 32px; background: #00bcd4; }
        .torso .front { transform: translateZ(8px); }
        .torso .back  { transform: rotateY(180deg) translateZ(8px); }
        .torso .left  { width: 16px; transform: rotateY(-90deg) translateZ(0px); }
        .torso .right { width: 16px; transform: rotateY(90deg) translateZ(24px); }
        .torso .top   { height: 16px; transform: rotateX(90deg) translateZ(8px); }

        .limb { width: 12px; height: 30px; transform-origin: top center; }
        .limb .face { width: 12px; height: 30px; }
        .limb .front { transform: translateZ(6px); }
        .limb .back  { transform: rotateY(180deg) translateZ(6px); }
        .arm .face { background: #00bcd4; }
        .leg .face { background: #3f51b5; }

        .arm.left  { left: -4px; top: 0; }
        .arm.right { left: 32px; top: 0; }
        .leg.left  { left: 8px; top: 32px; }
        .leg.right { left: 20px; top: 32px; }

        /* 걷기 애니메이션 */
        .walking .arm.left  { animation: swing 0.6s infinite alternate; }
        .walking .arm.right { animation: swing-rev 0.6s infinite alternate; }
        .walking .leg.left  { animation: swing-rev 0.6s infinite alternate; }
        .walking .leg.right { animation: swing 0.6s infinite alternate; }

        @keyframes swing { from { transform: rotateX(-30deg); } to { transform: rotateX(30deg); } }
        @keyframes swing-rev { from { transform: rotateX(30deg); } to { transform: rotateX(-30deg); } }

        /* 점프 애니메이션 */
        .jump-act { animation: jump-ani 0.5s ease-out; }
        @keyframes jump-ani { 0%, 100% { margin-top: 0; } 50% { margin-top: -100px; } }

        /* UI 레이아웃 */
        .ui { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; }
        .joy-base { width: 120px; height: 120px; background: rgba(0,0,0,0.2); border-radius: 50%; position: relative; pointer-events: auto; border: 2px solid #fff; }
        #stick { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; left: 35px; top: 35px; }
        .btn-jump { width: 80px; height: 80px; background: rgba(0,0,0,0.5); border: 3px solid #fff; border-radius: 50%; color: #fff; font-weight: bold; font-size: 16px; pointer-events: auto; }
    </style>
</head>
<body>

<div id="stage">
    <div id="world">
        <div class="floor"></div>
        <div id="player">
            <div class="cube head"><div class="face front"></div><div class="face back"></div><div class="face top"></div><div class="face left"></div><div class="face right"></div></div>
            <div class="cube torso"><div class="face front"></div><div class="face back"></div><div class="face left"></div><div class="face right"></div><div class="face top"></div></div>
            <div class="cube limb arm left"><div class="face front"></div><div class="face back"></div></div>
            <div class="cube limb arm right"><div class="face front"></div><div class="face back"></div></div>
            <div class="cube limb leg left"><div class="face front"></div><div class="face back"></div></div>
            <div class="cube limb leg right"><div class="face front"></div><div class="face back"></div></div>
        </div>
    </div>
</div>

<div class="ui">
    <div class="joy-base" id="joy"><div id="stick"></div></div>
    <button class="btn-jump" id="jumpBtn">JUMP</button>
</div>

<script>
    const player = document.getElementById('player');
    const stick = document.getElementById('stick');
    const joy = document.getElementById('joy');
    const jumpBtn = document.getElementById('jumpBtn');

    let pos = { x: 0, z: 0 };
    let move = { x: 0, z: 0 };
    const speed = 5;

    // 조이스틱 터치 이벤트
    const handleMove = (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = joy.getBoundingClientRect();
        const centerX = rect.left + 60;
        const centerY = rect.top + 60;
        const dx = touch.clientX - centerX;
        const dy = touch.clientY - centerY;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
        const angle = Math.atan2(dy, dx);

        stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        move.x = Math.cos(angle) * (dist / 50);
        move.z = Math.sin(angle) * (dist / 50);
        
        if(dist > 5) player.classList.add('walking');
        else player.classList.remove('walking');
    };

    joy.addEventListener('touchstart', handleMove);
    joy.addEventListener('touchmove', handleMove);
    joy.addEventListener('touchend', () => {
        stick.style.transform = `translate(0,0)`;
        move.x = 0; move.z = 0;
        player.classList.remove('walking');
    });

    // 점프 이벤트
    jumpBtn.onclick = () => {
        if(!player.classList.contains('jump-act')) {
            player.classList.add('jump-act');
            setTimeout(() => player.classList.remove('jump-act'), 500);
        }
    };

    // 프레임 업데이트
    function update() {
        pos.x += move.x * speed;
        pos.z += move.z * speed;

        const rotationY = (move.x !== 0 || move.z !== 0) 
            ? `rotateY(${-Math.atan2(move.z, move.x) * 180 / Math.PI + 90}deg)` 
            : player.style.transform.split('rotateY')[1] ? `rotateY${player.style.transform.split('rotateY')[1]}` : 'rotateY(0deg)';

        player.style.transform = `translate3d(${pos.x}px, 0, ${pos.z}px) ${rotationY} translate(-50%, -50%)`;
        requestAnimationFrame(update);
    }
    update();
</script>

</body>
</html>
